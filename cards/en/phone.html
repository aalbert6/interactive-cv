<button class="close">x</button>

<div class="card-content">

  <h2>Contact</h2>

  <form id="contact-form">

    <label for="name">Name</label>
    <input id="name" type="text" name="name" required />

    <label for="email">Email</label>
    <input id="email" type="email" name="email" required />

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="4" required></textarea>

    <button type="submit">Send</button>

  </form>

  <p id="form-status"></p>

  <div class="contact-extra">
    <p>You can also reach me through:</p>
    <div class="contact-actions">
  <button type="button" class="contact-link-btn" data-url="https://www.linkedin.com/in/albert-reina-buxo/">
    LinkedIn
  </button>

  <button type="button" class="contact-link-btn" data-url="https://github.com/aalbert6">
    GitHub
  </button>
</div>

</div>
